<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Post</title>
    <link rel="stylesheet" href="css/estilo_blog.css">
</head>
<body>

    <nav>
        <div class="nav-link"><a href="projects.html">Projetos</a></div>
        <div class="nav-link"><a href="/blog">Blog</a></div>
    </nav>

    <main>
        <section>
            <h2>Novo Post</h2>

            <form action="/cadastrar_post" method="post">
                <label for="titulo">Título</label>
                <input type="text" name="titulo" id="titulo">

                <label for="resumo">Resumo</label>
                <input type="text" name="resumo" id="resumo">

                <label for="conteudo">Conteúdo</label>
                <textarea name="conteudo" id="conteudo"></textarea>

                <input type="submit" value="Publicar">
            </form>
        </section>
    </main>

</body>
</html>
