<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Carro</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

    <nav>
        <div class="nav-link"><a href="projects.html">Projetos</a></div>
        <div class="nav-link"><a href="/carros">Carros</a></div>
        <div class="nav-link"><a href="gerenciar_carros.html">Gerenciar</a></div>
    </nav>

    <main>
        <section>
            <h2>Cadastrar Carro</h2>

            <form action="/cadastrar_carro" method="post">
                <label for="marca">Marca</label>
                <input type="text" name="marca" id="marca">

                <label for="modelo">Modelo</label>
                <input type="text" name="modelo" id="modelo">

                <label for="ano">Ano</label>
                <input type="text" name="ano" id="ano">

                <label for="qtde">Quantidade disponível</label>
                <input type="number" name="qtde_disponivel" id="qtde">

                <input type="submit" value="Cadastrar">
            </form>
        </section>
    </main>

</body>
</html>
